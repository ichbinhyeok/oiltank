spring.application.name=BuriedOilTankVerdict
gg.jte.templateLocation=src/main/jte
gg.jte.usePrecompiledTemplates=${GG_JTE_USE_PRECOMPILED_TEMPLATES:true}
gg.jte.developmentMode=${GG_JTE_DEVELOPMENT_MODE:false}
gg.jte.trimControlStructures=true
buried-oil-tank.base-url=${BURIED_OIL_TANK_BASE_URL:http://localhost:8080}
buried-oil-tank.storage-root=${BURIED_OIL_TANK_STORAGE_ROOT:storage}
buried-oil-tank.admin.username=${BURIED_OIL_TANK_ADMIN_USERNAME:admin}
buried-oil-tank.admin.password=${BURIED_OIL_TANK_ADMIN_PASSWORD:change-me-local}
