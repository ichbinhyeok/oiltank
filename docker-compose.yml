name: oiltankroute

services:
  app:
    image: ${IMAGE_NAME:-shinhyeok22/oiltank:latest}
    container_name: oiltankroute
    restart: unless-stopped
    ports:
      - "8097:8080"
    mem_limit: 512m
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      BURIED_OIL_TANK_BASE_URL: ${BURIED_OIL_TANK_BASE_URL:-https://oiltankroute.com}
      BURIED_OIL_TANK_STORAGE_ROOT: /app/storage
      BURIED_OIL_TANK_ADMIN_USERNAME: ${BURIED_OIL_TANK_ADMIN_USERNAME:-}
      BURIED_OIL_TANK_ADMIN_PASSWORD: ${BURIED_OIL_TANK_ADMIN_PASSWORD:-}
      GG_JTE_DEVELOPMENT_MODE: "false"
      GG_JTE_USE_PRECOMPILED_TEMPLATES: "true"
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseG1GC -Xms256m -Xmx384m -Xss512k -Djava.security.egd=file:/dev/./urandom}
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
